name: Fetch Terminations

on:
  workflow_dispatch:
    inputs:
      fy:
        description: "Space-separated fiscal years (e.g. '2026 2025'). Blank = config.yaml default."
        required: false
        default: ""
      agencies:
        description: "Space-separated agency codes (e.g. '097 036'). Blank = all toptier."
        required: false
        default: ""
      force:
        description: "Re-download even if checkpoint exists"
        type: boolean
        default: false
      build_only:
        description: "Skip fetch, just rebuild dashboard from R2 checkpoints"
        type: boolean
        default: false
  schedule:
    - cron: "0 9 1 * *"  # 1st of each month at 9am UTC

permissions:
  actions: write
  contents: write

concurrency:
  group: fetch-terminations
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ inputs.build_only != true }}

    env:
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}

    outputs:
      status: ${{ steps.fetch.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download checkpoints from R2
        run: python r2_sync.py download --dir data/bulk_checkpoints

      - name: Run fetch
        id: fetch
        run: |
          ARGS="--summary-file $GITHUB_STEP_SUMMARY"
          if [ -n "${{ inputs.agencies }}" ]; then
            ARGS="$ARGS --agencies ${{ inputs.agencies }}"
          fi
          if [ -n "${{ inputs.fy }}" ]; then
            ARGS="$ARGS --fy ${{ inputs.fy }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --force-current-fy"
          fi
          python fetch_awards.py $ARGS
          echo "status=$(cat data/scan_status.txt)" >> $GITHUB_OUTPUT

      - name: Upload checkpoints to R2
        if: always()
        run: python r2_sync.py upload --dir data/bulk_checkpoints

      - name: R2 summary
        if: always()
        run: python r2_sync.py summary --summary-file $GITHUB_STEP_SUMMARY

      - name: Chain next run if IP blocked
        if: steps.fetch.outputs.status == 'blocked'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "IP blocked -- chaining next run with fresh runner IP"
          gh workflow run fetch.yml --repo ${{ github.repository }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [fetch]
    if: ${{ always() && (needs.fetch.outputs.status == 'done' || inputs.build_only == true) }}

    env:
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard (hydrates from R2 if needed)
        run: python build_dashboard.py

      - name: Commit dashboard JSONs
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update dashboard data [skip ci]"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: ${{ always() && needs.build.result == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, needed to fast-forward prod
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward prod -> main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main prod || git fetch origin main
          git checkout -B prod origin/main
          git push origin prod --force-with-lease
